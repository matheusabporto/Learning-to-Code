<script>
// funções
function pulaLinha(){
	document.write("<br>");
	}
function mostra(frase){
	document.write(frase);
	pulaLinha();
	}

//entrada de dados
var vitorias = Number(prompt("Quantas vitórias o seu time teve?"));
var empates = Number(prompt("Quantos empates o seu time teve?"));
var vitadversario = Number(prompt("Quantas vitórias o time adversário teve?"));
var empatadversario = Number(prompt("Quantos empates o time adversário teve?"));
function pontos (){
	return vitorias*3 + empates;
	}
function pontosadversario (){
	return vitadversario*3 + empatadversario;
	}
mostra("O seu time obteve " + pontos() + " pontos!");
mostra("O time adversário obteve " + pontosadversario() + " pontos!");
//if


if (pontos()>pontosadversario()){
	mostra("SEu time está na frente do time adversário!");
	} else if (pontos()==pontosadversario()){
		mostra("Seu time está empatado com o time adversário!");
		} else {
			mostra("Seu time está atrás do time adversário");
			}
</script>
