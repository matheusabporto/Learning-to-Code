<script>
  var PulaLinha = function() {
      document.write("<br>");
  };
  var mostra = function(frase) {
      document.write(frase);
    PulaLinha();
  };
  var vitorias = prompt("Quantos jogos o Palmeiras venceu?");
  var empates = prompt("Quantos jogos o Palmeiras empatou");
      empates = parseInt(empates);
  var pontos = (vitorias*3) + empates;
  mostra("O Palmeiras tem " + pontos + " pontos!");
</script>
