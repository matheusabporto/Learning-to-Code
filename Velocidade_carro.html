Crie um programa que solicite a distância percorrida por um carro em Km, e o tempo decorrido nesse trajeto em horas. O programa deve calcular e apresentar a velocidade média do carro nesse trajeto.
<br><hr><br>

<script>
  //declaração de variáveis
  var distancia, velocidade, tempo;
  //entrada de dados
  distancia = Number(prompt("Qual a distância percorrida, em Km"));
  tempo = Number(prompt("Tempo decorrido do trajeto, em horas"));
  //processamento de dados
  velocidade = distancia/tempo
  //saída de resultado
  document.write("Sua velocidade média é = " + velocidade.ToFixed(2) + " Km/hr");
</script>
