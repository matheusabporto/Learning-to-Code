fazer um programa de par ou impar
<br><hr><br>
<script>
//declaração de variáveis
var N
//declaração de funções
//entrada de dados
N = parseInt(prompt("Informe um valor inteiro: "));
//processamento de dados
if (N%2 == 0) {
  alert("O valor " + N + " é par");
} else {
  alert("O valor " + N + " é ímpar");
}
//entrega de resultado
</script>
